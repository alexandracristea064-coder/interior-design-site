<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Galerie</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <h1>Galerie</h1>
    <nav>
        <a href="/">Acasă</a>
        <a href="/gallery">Galerie</a>
    </nav>
</header>

<section class="gallery hidden">

    <div class="card hidden">
        <img src="https://images.unsplash.com/photo-1505691938895-1758d7feb511">
    </div>

    <div class="card hidden">
        <img src="https://images.unsplash.com/photo-1507089947368-19c1da9775ae">

    <div class="card hidden">

    </div>

    <div class="card hidden">
        <img src="https://images.unsplash.com/photo-1499951360447-b19be8fe80f5">
    </div>

</section>

<script>
const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            entry.target.classList.add("show");
        }
    });
});

const hiddenElements = document.querySelectorAll(".hidden");
hiddenElements.forEach(el => observer.observe(el));
</script>

</body>
</html>
